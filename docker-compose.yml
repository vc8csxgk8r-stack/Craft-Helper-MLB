version: "3.8"

# ─────────────────────────────────────────────
#  Sorare MLB 2026 — Tier List par Division
#  Déploiement Portainer · Port 8573
#  Source : github.com/TON_USER/sorare-mlb
#
#  Les fichiers sont EMBARQUÉS dans l'image via
#  le Dockerfile — aucun volume nécessaire.
# ─────────────────────────────────────────────

services:

  sorare-mlb:
    build:
      context: ./app                # Dockerfile + index.html + nginx.conf
      dockerfile: Dockerfile
    image: craft-helper:latest
    container_name: craft-helper
    restart: unless-stopped

    ports:
      - "8573:80"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    labels:
      - "com.docker.compose.project=craft-helper"
      - "traefik.enable=false"

networks:
  default:
    name: craft-helper
