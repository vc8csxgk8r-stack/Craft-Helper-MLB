version: "3.8"

# ─────────────────────────────────────────────────────────────────
#  Sorare MLB 2026 — Tier List par Division
#  Déploiement Portainer · Port 8573
#
#  Zéro build · Zéro volume · Zéro registry externe
#  Seule dépendance : nginx:alpine (Docker Hub officiel)
#  Le HTML est embarqué en base64+gzip dans ce fichier.
# ─────────────────────────────────────────────────────────────────

services:

  sorare-mlb:
    image: nginx:alpine
    container_name: sorare-mlb
    restart: unless-stopped

    ports:
      - "8573:80"

    command:
      - /bin/sh
      - -c
      - >-
        echo '' | base64 -d | gunzip > /usr/share/nginx/html/index.html &&
        echo 'server{listen 80;root /usr/share/nginx/html;index index.html;location/{try_files $$uri $$uri/ /index.html;}gzip on;gzip_types text/html text/css application/javascript;}' > /etc/nginx/conf.d/default.conf &&
        nginx -g 'daemon off;'

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  default:
    name: sorare-mlb-net
