version: "3.8"

# ─────────────────────────────────────────────
#  Sorare MLB 2026 — Tier List par Division
#  Déploiement Portainer · Port 8573
#  Source : github.com/TON_USER/sorare-mlb
# ─────────────────────────────────────────────

services:

  sorare-mlb:
    image: nginx:alpine                          # image de base légère
    container_name: sorare-mlb
    restart: unless-stopped

    # Monte les fichiers directement depuis le dépôt cloné
    # (Portainer doit avoir accès au chemin hôte, ou utiliser un volume)
    volumes:
      - ./app/index.html:/usr/share/nginx/html/index.html:ro
      - ./app/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    ports:
      - "8573:80"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    labels:
      - "com.docker.compose.project=sorare-mlb"
      - "traefik.enable=false"        # mettre true si tu utilises Traefik

networks:
  default:
    name: sorare-mlb-net
