<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorare MLB 2026 — Tiers par Division</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #161b27;
    --bg3: #1e2535;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --text2: #8b92a8;
    --text3: #535a72;
    --nl: #2563eb;
    --nl-bg: rgba(37,99,235,0.12);
    --al: #d97706;
    --al-bg: rgba(217,119,6,0.12);
    --t6: #f59e0b;
    --t5: #a78bfa;
    --t4: #34d399;
    --t3: #60a5fa;
    --t2: #8b92a8;
    --t1: #535a72;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }

  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .logo span { color: var(--t6); }
  .header-meta { font-size: 12px; color: var(--text2); }

  .controls { padding: 14px 20px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; min-width: 40px; }
  .btn { font-size: 12px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
  .btn.active { background: var(--bg3); color: var(--text); border-color: var(--border2); font-weight: 600; }
  .btn.active-nl { background: var(--nl-bg); color: #60a5fa; border-color: rgba(37,99,235,0.3); }
  .btn.active-al { background: var(--al-bg); color: #fbbf24; border-color: rgba(217,119,6,0.3); }

  .search-wrap { margin-left: auto; }
  .search-wrap input { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; color: var(--text); font-size: 12px; width: 180px; outline: none; }
  .search-wrap input:focus { border-color: var(--border2); }
  .search-wrap input::placeholder { color: var(--text3); }

  .legend { padding: 10px 20px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; gap: 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
  .legend-stars { font-size: 10px; letter-spacing: -1px; }

  main { padding: 16px 20px; max-width: 1600px; margin: 0 auto; }
  .stats-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 14px; }
  .stat-card .val { font-size: 20px; font-weight: 700; color: var(--text); }
  .stat-card .lbl { font-size: 11px; color: var(--text3); margin-top: 1px; }

  .divisions { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .division-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .div-header { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .div-name { font-size: 13px; font-weight: 700; }
  .div-header.nl .div-name { color: #60a5fa; }
  .div-header.al .div-name { color: #fbbf24; }
  .div-meta { display: flex; align-items: center; gap: 6px; }
  .league-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.04em; }
  .nl-badge { background: var(--nl-bg); color: #60a5fa; border: 1px solid rgba(37,99,235,0.2); }
  .al-badge { background: var(--al-bg); color: #fbbf24; border: 1px solid rgba(217,119,6,0.2); }
  .count-badge { font-size: 10px; color: var(--text3); }

  .pos-section { border-bottom: 1px solid var(--border); }
  .pos-section:last-child { border-bottom: none; }
  .pos-header { padding: 6px 14px 4px; display: flex; align-items: center; gap: 6px; }
  .pos-tag { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; background: var(--bg3); color: var(--text2); letter-spacing: 0.05em; }
  .pos-count { font-size: 10px; color: var(--text3); }
  .player-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 14px; gap: 8px; }
  .player-row:last-child { padding-bottom: 8px; }
  .player-row:hover { background: var(--bg3); }
  .player-info { display: flex; align-items: baseline; gap: 5px; min-width: 0; }
  .player-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-team { font-size: 11px; color: var(--text3); flex-shrink: 0; }
  .stars { font-size: 10px; letter-spacing: -1.5px; flex-shrink: 0; }
  .s6 { color: var(--t6); }
  .s5 { color: var(--t5); }
  .s4 { color: var(--t4); }
  .s3 { color: var(--t3); }
  .s2 { color: var(--t2); }
  .s1 { color: var(--t1); }
  .no-results { padding: 12px 14px; font-size: 12px; color: var(--text3); font-style: italic; }

  footer { padding: 20px; text-align: center; font-size: 11px; color: var(--text3); border-top: 1px solid var(--border); margin-top: 24px; }
</style>
</head>

<header>

</header>

    <button class="btn" id="btn-al" onclick="setLeague('AL',this)">AL</button>
  </div>
  <div class="filter-group">
    <span class="filter-label">Pos.</span>
    <button class="btn active" onclick="setPos('all',this)">Tous</button>
    <button class="btn" onclick="setPos('SP',this)">SP</button>

    <button class="btn" onclick="setPos('OF',this)">OF</button>
    <button class="btn" onclick="setPos('DH',this)">DH</button>
  </div>
  <div class="filter-group">
    <span class="filter-label">Tier</span>
    <button class="btn active" onclick="setTier(1,this)">★+</button>
    <button class="btn" onclick="setTier(3,this)">★★★+</button>
    <button class="btn" onclick="setTier(5,this)">★★★★★+</button>
  </div>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Rechercher un joueur..." oninput="render()">
  </div>
</div>

<div class="legend">
  <div class="legend-item"><span class="legend-stars s6">★★★★★★</span> Élite mondial</div>
  <div class="legend-item"><span class="legend-stars s5">★★★★★</span> Star établie</div>

  <div class="legend-item"><span class="legend-stars s3">★★★</span> Solide</div>
  <div class="legend-item"><span class="legend-stars s2">★★</span> Correct</div>
  <div class="legend-item"><span class="legend-stars s1">★</span> Profondeur</div>
</div>

<main>
  <div class="stats-bar" id="stats-bar"></div>
  <div class="divisions" id="divisions"></div>
</main>

<footer>
  Données basées sur les rosters officiels MLB.com Opening Day 2026 · Sorare MLB Tier List · Mis à jour avril 2026
</footer>

let league = 'all', pos = 'all', tierMin = 1;

function setLeague(v, btn) {
  league = v;
  document.querySelectorAll('.filter-group:nth-child(1) .btn').forEach(b => b.className = 'btn');
  btn.classList.add('active');
  render();
}
function setPos(v, btn) {
  pos = v;
  document.querySelectorAll('.filter-group:nth-child(2) .btn').forEach(b => b.className = 'btn');
  btn.classList.add('active');
  render();
}
function setTier(v, btn) {
  tierMin = v;
  document.querySelectorAll('.filter-group:nth-child(3) .btn').forEach(b => b.className = 'btn');
  btn.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const divs = document.getElementById('divisions');
  divs.innerHTML = '';
  let totalPlayers = 0, totalVisible = 0;

  Object.entries(DATA).forEach(([divName, divData]) => {
    totalPlayers += divData.players.length;
    if (league !== 'all' && divData.league !== league) return;

    const filtered = divData.players.filter(p => {
      if (pos !== 'all' && p.pos !== pos) return false;
      if (p.tier < tierMin) return false;
      if (q && !p.name.toLowerCase().includes(q) && !p.team.toLowerCase().includes(q)) return false;
      return true;
    });
    totalVisible += filtered.length;

    const card = document.createElement('div');
    card.className = 'division-card';
    const hl = divData.league === 'NL' ? 'nl' : 'al';
    const badge = divData.league === 'NL' ? 'nl-badge' : 'al-badge';
    card.innerHTML = `<div class="div-header ${hl}">
      <span class="div-name">${divName}</span>
      <div class="div-meta">
        <span class="league-badge ${badge}">${divData.league}</span>
        <span class="count-badge">${filtered.length} joueur${filtered.length>1?'s':''}</span>
      </div>
    </div>`;

    const byPos = {};
    [...filtered].sort((a,b)=>(POS_ORDER[a.pos]??9)-(POS_ORDER[b.pos]??9)||b.tier-a.tier)
      .forEach(p => { (byPos[p.pos]=byPos[p.pos]||[]).push(p); });

    if (!Object.keys(byPos).length) {
      card.innerHTML += `<div class="no-results">Aucun joueur dans ce filtre</div>`;
    } else {
      Object.entries(byPos).forEach(([p, plist]) => {
        const sec = document.createElement('div');
        sec.className = 'pos-section';
        sec.innerHTML = `<div class="pos-header"><span class="pos-tag">${p}</span><span class="pos-count">${plist.length}</span></div>`;
        plist.forEach(pl => {
          const row = document.createElement('div');
          row.className = 'player-row';
          row.innerHTML = `<div class="player-info"><span class="player-name">${pl.name}</span><span class="player-team">${pl.team}</span></div><span class="stars ${TIER_CLS[pl.tier-1]}">${TIERS[pl.tier-1]}</span>`;
          sec.appendChild(row);
        });
        card.appendChild(sec);
      });
    }
    divs.appendChild(card);
  });

  // stats bar
  const sb = document.getElementById('stats-bar');
  sb.innerHTML = `
    <div class="stat-card"><div class="val">${totalVisible}</div><div class="lbl">Joueurs affichés</div></div>
    <div class="stat-card"><div class="val">${totalPlayers}</div><div class="lbl">Total roster</div></div>
    <div class="stat-card"><div class="val">6</div><div class="lbl">Divisions</div></div>
    <div class="stat-card"><div class="val">30</div><div class="lbl">Équipes MLB</div></div>
  `;
}

render();
